<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Admin - Godwin Repair</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Gallery Admin Panel</h1>
      <p>Upload images and create new gallery projects</p>
    </header>

    <form id="projectForm">
      <div class="form-group">
        <label for="title">Project Title *</label>
        <input type="text" id="title" required placeholder="e.g., Kitchen Remodel">
      </div>

      <div class="form-group">
        <label for="category">Category *</label>
        <select id="category" required>
          <option value="">Select a category</option>
          <option value="General Repairs">General Repairs</option>
          <option value="Remodelling">Remodelling</option>
          <option value="Upscale Projects">Upscale Projects</option>
        </select>
      </div>

      <div class="form-group">
        <label for="description">Description *</label>
        <textarea id="description" required rows="3" placeholder="Brief description of the project"></textarea>
      </div>

      <div class="form-group">
        <label for="completedDate">Completion Date *</label>
        <input type="date" id="completedDate" required>
      </div>

      <div class="form-group">
        <label for="images">Project Images *</label>
        <input type="file" id="images" multiple accept="image/*" required>
        <small>Upload one or more images for this project</small>
        <div id="imagePreview" class="image-preview"></div>
      </div>

      <div class="form-group">
        <label for="tags">Tags (comma-separated)</label>
        <input type="text" id="tags" placeholder="kitchen, remodel, renovation">
      </div>

      <div class="form-group">
        <label>
          <input type="checkbox" id="featured">
          Mark as Featured
        </label>
      </div>

      <button type="submit" id="submitBtn">Create Project</button>
      <div id="status" class="status"></div>
    </form>

    <div id="projectsList" class="projects-list">
      <h2>Existing Projects</h2>
      <div id="projectsContainer"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
